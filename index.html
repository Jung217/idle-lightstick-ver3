<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lightstick Hacker V3</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            /* 防止整個頁面被滑動 */
            touch-action: none;
            /* 禁用預設的觸控滑動行為 */
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            /* 讓面板在網頁中居中 */
            background-color: rgb(27, 16, 60);
            /* 依據使用者指定的色碼更換背景 */
            color: white;
            box-sizing: border-box;
        }

        .panel {
            background: #1e1e1e;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8), 0 0 20px rgba(200, 76, 234, 0.15);
            /* 增強紫紅發光 */
            text-align: center;
            max-width: 450px;
            width: 90%;
            /* 手機上左右留點邊距 */
            border: 1px solid #41194a;
            /* 邊框也帶點紫暗色 */
            box-sizing: border-box;
            max-height: 95vh;
            /* 避免螢幕過小被截斷 */
            overflow-y: auto;
            /* 若螢幕真的太小，只允許面板內部滾動 */
        }

        .section {
            margin-top: 25px;
            padding-top: 25px;
            border-top: 1px solid #333;
        }

        h2 {
            margin: 0 0 5px 0;
            color: #fff;
            font-size: 24px;
            letter-spacing: 1px;
        }

        h3 {
            margin: 0 0 20px 0;
            color: #ea4c89;
            font-size: 16px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* 連線按鈕 */
        #connectBtn {
            background: linear-gradient(135deg, #ff00ff, #cc00cc);
            /* 全局紫紅漸層改為 FF00FF 基底 */
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 0, 255, 0.5);
            /* 紫紅發光陰影 (#FF00FF = 255, 0, 255) */
            width: 80%;
            margin-top: 15px;
        }

        #connectBtn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 0, 255, 0.8);
        }

        #connectBtn.connected {
            background: linear-gradient(135deg, #1abc9c, #16a085);
            box-shadow: 0 4px 15px rgba(26, 188, 156, 0.4);
        }

        /* 狀態文字 */
        #status {
            margin-top: 15px;
            font-size: 13px;
            color: #888;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #555;
            display: inline-block;
        }

        .status-dot.active {
            background-color: #2ecc71;
            box-shadow: 0 0 8px #2ecc71;
        }

        /* 控制區塊容器 (連線前隱藏或半透明) */
        #controlArea {
            opacity: 0.5;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        #controlArea.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* 調色盤 */
        .color-picker-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        input[type="color"] {
            appearance: none;
            -webkit-appearance: none;
            border: none;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            cursor: pointer;
            padding: 0;
            background: none;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
            transition: box-shadow 0.3s;
        }

        input[type="color"]::-webkit-color-swatch-wrapper {
            padding: 0;
        }

        input[type="color"]::-webkit-color-swatch {
            border: 4px solid #333;
            border-radius: 50%;
        }

        /* 亮度拉桿 */
        .slider-container {
            width: 80%;
            margin: 20px auto 0;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .slider-label {
            font-size: 14px;
            color: #aaa;
            width: 40px;
            text-align: right;
        }

        input[type="range"] {
            flex-grow: 1;
            appearance: none;
            -webkit-appearance: none;
            height: 6px;
            background: #444;
            border-radius: 3px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            appearance: none;
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #ff00ff;
            /* 修改拉桿圓鈕為紫紅色 */
            cursor: pointer;
            box-shadow: 0 0 10px rgba(255, 0, 255, 0.6);
        }

        /* 快捷色與功能鍵 */
        .quick-colors {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 25px;
            flex-wrap: wrap;
        }

        .color-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid #444;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .color-btn:hover {
            transform: scale(1.1);
            border-color: #fff;
        }

        .action-btn {
            background: #2a0b2a;
            /* 配合 #ff00ff 的暗底色 */
            color: #ff00ff;
            border: 1px solid #ff00ff;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
            margin: 5px;
            box-shadow: 0 0 10px rgba(255, 0, 255, 0.2);
        }

        .action-btn:hover {
            background: #ff00ff;
            color: white;
            box-shadow: 0 0 15px rgba(255, 0, 255, 0.5);
        }

        #offBtn {
            background: #1a050f;
            border-color: #e74c3c;
            color: #e74c3c;
            box-shadow: 0 0 10px rgba(231, 76, 60, 0.2);
        }

        #offBtn:hover {
            background: #e74c3c;
            color: white;
            box-shadow: 0 0 15px rgba(231, 76, 60, 0.5);
        }

        /* 數值顯示 */
        .value-display {
            font-family: monospace;
            color: #ff00ff;
            font-size: 12px;
            margin-top: 10px;
            background: #111;
            padding: 5px 10px;
            border-radius: 4px;
            display: inline-block;
        }

        /* Toast 提示框樣式 */
        #toast-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 9999;
        }

        .toast {
            background: rgba(50, 50, 50, 0.95);
            backdrop-filter: blur(10px);
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            font-size: 14px;
            opacity: 0;
            transform: translateY(20px);
            animation: fade-in-up 0.3s forwards;
            border: 1px solid #444;
        }

        .toast.success {
            border-left: 4px solid #2ecc71;
        }

        .toast.error {
            border-left: 4px solid #e74c3c;
        }

        .toast.info {
            border-left: 4px solid #3498db;
        }

        .toast.fade-out {
            animation: fade-out-down 0.3s forwards;
        }

        @keyframes fade-in-up {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fade-out-down {
            to {
                opacity: 0;
                transform: translateY(20px);
            }
        }
    </style>
</head>

<body>

    <div class="panel">
        <h2>Neverland</h2>
        <h3>Lightstick Remote V3</h3>

        <button id="connectBtn">尋找並連線手燈</button>
        <div id="status"><span class="status-dot" id="statusDot"></span><span id="statusText">等待連線...</span></div>

        <div id="controlArea">
            <div class="section">
                <div class="color-picker-container">
                    <input type="color" id="colorPicker" value="#ff00ff">
                    <div class="value-display" id="hexDisplay">HEX: #FF00FF | BRT: 100%</div>
                </div>

                <div class="slider-container">
                    <span class="slider-label">🔆</span>
                    <input type="range" id="brightnessSlider" min="0" max="100" value="100">
                    <span class="slider-label" id="brightnessLabel">100%</span>
                </div>

                <div class="quick-colors">
                    <div class="color-btn" style="background-color: #ff00ff;" data-color="#ff00ff" title="官方紫"></div>
                    <div class="color-btn" style="background-color: #ff0000;" data-color="#ff0000" title="正紅"></div>
                    <div class="color-btn" style="background-color: #00ff00;" data-color="#00ff00" title="純綠"></div>
                    <div class="color-btn" style="background-color: #0000ff;" data-color="#0000ff" title="純藍"></div>
                    <div class="color-btn" style="background-color: #ffffff;" data-color="#ffffff" title="純白"></div>
                </div>
            </div>

            <div class="section" style="padding-top: 15px;">
                <button class="action-btn" id="seqLightBtn" style="border-color: #3498db; color: #3498db;">跑馬燈
                    (依序點亮)</button>
                <button class="action-btn" id="offBtn">關閉光芒</button>
            </div>
        </div>
    </div>

    <div id="toast-container"></div>

    <script>
        const TARGET_UUID = "00000000-0000-1000-8000-00805f9b34fb";
        const AES_KEY_HEX = "2174516473A1F5351004A13E6B716AB9";
        let lightstickCharacteristic = null;

        // UI 元素
        const connectBtn = document.getElementById('connectBtn');
        const statusText = document.getElementById('statusText');
        const statusDot = document.getElementById('statusDot');
        const controlArea = document.getElementById('controlArea');
        const colorPicker = document.getElementById('colorPicker');
        const brightnessSlider = document.getElementById('brightnessSlider');
        const brightnessLabel = document.getElementById('brightnessLabel');
        const hexDisplay = document.getElementById('hexDisplay');

        // 目前選擇的狀態
        let currentColorHex = "#ff00ff";
        let currentBrightness = 100;
        let lastSentPayload = ""; // 避免重複發送相同的封包

        // 防抖定時器
        let sendTimeout = null;

        function showToast(message, type = "info") {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerText = message;
            container.appendChild(toast);
            setTimeout(() => {
                toast.classList.add('fade-out');
                toast.addEventListener('animationend', () => toast.remove());
            }, 3000);
        }

        function encryptCommand(hexString) {
            const key = CryptoJS.enc.Hex.parse(AES_KEY_HEX);
            const plaintext = CryptoJS.enc.Hex.parse(hexString);
            const encrypted = CryptoJS.AES.encrypt(plaintext, key, {
                mode: CryptoJS.mode.ECB,
                padding: CryptoJS.pad.NoPadding
            });
            return encrypted.ciphertext.toString(CryptoJS.enc.Hex).toUpperCase();
        }

        connectBtn.addEventListener('click', async () => {
            if (lightstickCharacteristic) {
                // TODO: 實作手動斷線邏輯 (Web Bluetooth API 需透過 device.gatt.disconnect())
                return;
            }

            try {
                showToast("正在尋找手燈...", "info");
                statusText.innerText = "正在請求藍牙權限...";

                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ services: [TARGET_UUID] }]
                });

                device.addEventListener('gattserverdisconnected', onDisconnected);

                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(TARGET_UUID);
                lightstickCharacteristic = await service.getCharacteristic(TARGET_UUID);

                statusText.innerText = `連線成功 (${device.name || 'Lightstick'})`;
                statusDot.classList.add('active');
                connectBtn.innerText = "已連線";
                connectBtn.classList.add('connected');
                controlArea.classList.add('active');

                showToast("手燈連線成功！", "success");

                // 連線後發送目前的面板顏色 (強制設為官方紫)
                currentColorHex = "#ff00ff";
                colorPicker.value = currentColorHex;
                currentBrightness = 100;
                brightnessSlider.value = currentBrightness;
                brightnessLabel.innerText = "100%";
                updateAndSendColor();

            } catch (error) {
                statusText.innerText = "連線失敗或取消";
                showToast("連線失敗: " + error.message, "error");
            }
        });

        function onDisconnected() {
            lightstickCharacteristic = null;
            if (seqLightInterval) clearInterval(seqLightInterval);
            statusText.innerText = "設備已斷線";
            statusDot.classList.remove('active');
            connectBtn.innerText = "重新連線";
            connectBtn.classList.remove('connected');
            controlArea.classList.remove('active');
            showToast("手燈已斷開連線", "error");
        }

        async function sendRawData(hexString, useEncryption = true, forceChunking = false) {
            if (!lightstickCharacteristic) return;

            // 避免重複發送完全相同的指令
            if (hexString === lastSentPayload) return;
            lastSentPayload = hexString;

            try {
                const finalHex = useEncryption ? encryptCommand(hexString) : hexString;
                const bytesArray = new Uint8Array(finalHex.match(/.{1,2}/g).map(byte => parseInt(byte, 16)));

                // 為了避免藍牙底層 MTU=23 (Payload=20) 限制導致直接截斷，
                // 如果長度超過 20 Bytes，則手動分成小塊 (Chunks) 傳送
                const CHUNK_SIZE = 20;
                for (let i = 0; i < bytesArray.length; i += CHUNK_SIZE) {
                    const chunk = bytesArray.slice(i, i + CHUNK_SIZE);
                    await lightstickCharacteristic.writeValueWithoutResponse(chunk);
                    // 稍微延遲避免發送過快塞車
                    if (bytesArray.length > CHUNK_SIZE) {
                        await new Promise(resolve => setTimeout(resolve, 20));
                    }
                }

                console.log(`[送出] 原始: ${hexString} -> 加密(${useEncryption}): ${finalHex} (${bytesArray.length} bytes)`);
            } catch (error) {
                console.error("寫入失敗:", error);
                // 有可能因為斷線導致寫入失敗，但 gattserverdisconnected 事件還沒立刻觸發
            }
        }

        // 將 HEX 色碼 (#RRGGBB) 轉換並套用亮度，產出 8201 封包
        function updateAndSendColor() {
            // 解析 HEX 為 RGB 整數
            let r = parseInt(currentColorHex.slice(1, 3), 16);
            let g = parseInt(currentColorHex.slice(3, 5), 16);
            let b = parseInt(currentColorHex.slice(5, 7), 16);

            // 套用亮度百分比
            const multiplier = currentBrightness / 100;
            r = Math.round(r * multiplier);
            g = Math.round(g * multiplier);
            b = Math.round(b * multiplier);

            // 轉回 2 位數的 HEX 字串 (如 0A, FF)
            const rHex = r.toString(16).padStart(2, '0').toUpperCase();
            const gHex = g.toString(16).padStart(2, '0').toUpperCase();
            const bHex = b.toString(16).padStart(2, '0').toUpperCase();

            // 這裡使用 RGBW 格式 (最後的 00 代表 White 通道不啟用，由 RGB 混光)
            const colorPayload = `${rHex}${gHex}${bHex}00`;

            // 組合完整指令: 8201 + RGBW + 00000000 (保留/其他參數) + FD (Checksum/結尾標記) + GRAVE
            const rawCmd = "8201" + colorPayload + "00000000" + "FD" + "4752415645";

            // 更新 UI 顯示 (為求發光效果，Color Picker 的框不套用亮度，保持原色，但用 shadow 表現亮度)
            colorPicker.style.boxShadow = `0 0 ${currentBrightness / 2 + 10}px ${currentColorHex}`;
            hexDisplay.innerText = `R:${rHex} G:${gHex} B:${bHex} | BRT: ${currentBrightness}%`;

            // 發送 (加密)
            sendRawData(rawCmd, true);
        }

        // 防抖處理函式：避免拉桿拖曳時一秒內送出幾百次指令
        function debouncedUpdateAndSend() {
            if (sendTimeout) clearTimeout(sendTimeout);
            // 設定 50ms 的延遲，兼顧反應速度與傳輸穩定性 (20fps)
            sendTimeout = setTimeout(updateAndSendColor, 50);
        }

        // 監聽顏色選擇器變化 (input 事件是拖曳中即時觸發)
        colorPicker.addEventListener('input', (e) => {
            currentColorHex = e.target.value;
            debouncedUpdateAndSend();
        });

        // 監聽亮度拉桿變化
        brightnessSlider.addEventListener('input', (e) => {
            currentBrightness = parseInt(e.target.value);
            brightnessLabel.innerText = currentBrightness + '%';
            debouncedUpdateAndSend();
        });

        // 快捷顏色按鈕
        document.querySelectorAll('.color-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const hex = e.target.getAttribute('data-color');
                currentColorHex = hex;
                colorPicker.value = hex;
                debouncedUpdateAndSend();
            });
        });

        // 關閉按鈕
        document.getElementById('offBtn').addEventListener('click', () => {
            if (seqLightInterval) {
                clearInterval(seqLightInterval); // 停止跑馬燈
                seqLightInterval = null;
            }
            // 將亮度設為 0
            currentBrightness = 0;
            brightnessSlider.value = 0;
            brightnessLabel.innerText = "0%";
            updateAndSendColor();
            showToast("光芒已關閉", "info");
        });

        // 依序點亮 (Sequential Lighting) 邏輯
        let seqLightInterval = null;
        let seqCurrentPixel = 0;
        const TOTAL_PIXELS = 12; // 假設手燈有 12 顆燈珠 (需要根據實體驗證調整)

        document.getElementById('seqLightBtn').addEventListener('click', () => {
            if (!lightstickCharacteristic) return;

            // 如果已經在跑，就停止
            if (seqLightInterval) {
                clearInterval(seqLightInterval);
                seqLightInterval = null;
                showToast("已停止跑馬燈", "info");
                return;
            }

            // 先整支關燈
            sendRawData("82010000000000000000FD4752415645", true);

            seqCurrentPixel = 0;
            showToast("跑馬燈啟動！", "success");

            // 解析當前 UI 選擇的顏色
            let r = parseInt(currentColorHex.slice(1, 3), 16);
            let g = parseInt(currentColorHex.slice(3, 5), 16);
            let b = parseInt(currentColorHex.slice(5, 7), 16);

            const multiplier = currentBrightness / 100;
            r = Math.round(r * multiplier);
            g = Math.round(g * multiplier);
            b = Math.round(b * multiplier);

            const rHex = r.toString(16).padStart(2, '0').toUpperCase();
            const gHex = g.toString(16).padStart(2, '0').toUpperCase();
            const bHex = b.toString(16).padStart(2, '0').toUpperCase();
            const colorPayload = `${rHex}${gHex}${bHex}00`; // RGBW
            const blackPayload = `00000000`; // 暗掉的 RGBW

            // 每 150 毫秒點亮下一顆燈
            seqLightInterval = setInterval(async () => {
                if (seqCurrentPixel >= TOTAL_PIXELS) {
                    clearInterval(seqLightInterval);
                    seqLightInterval = null;
                    return;
                }

                // 根據實驗四經驗：8202 + 超長字串 (明文傳輸)
                let cmdString = "8202";

                // 動態組裝字串
                for (let i = 0; i < TOTAL_PIXELS; i++) {
                    if (i <= seqCurrentPixel) {
                        cmdString += colorPayload;
                    } else {
                        cmdString += blackPayload;
                    }
                }

                // 8202 是透過明文傳輸不加密
                await sendRawData(cmdString, false);

                seqCurrentPixel++;
            }, 200);
        });

    </script>
</body>

</html>
